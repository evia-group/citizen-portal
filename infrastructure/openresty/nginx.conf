server {
  client_max_body_size 10M;
  client_body_temp_path /var/run/openresty/nginx-client-body;
  proxy_temp_path /var/run/openresty/nginx-proxy;
  fastcgi_temp_path /var/run/openresty/nginx-fastcgi;
  uwsgi_temp_path /var/run/openresty/nginx-uwsgi;
  scgi_temp_path /var/run/openresty/nginx-scgi;

  listen      80;
  server_name host.docker.internal;
  # 127.0.0.11 is Docker's embedded DNS resolver.
  # Using variables in proxy_pass forces per-request resolution so nginx
  # can start even when upstream containers are absent (e.g. Mode B).
  resolver    127.0.0.11 valid=1s ipv6=off;
  expires     0;
  add_header  Cache-Control private;
  error_log   /dev/stdout  debug;

  location / {
      set $user_portal_fe user-portal-fe:8181;
      proxy_pass http://$user_portal_fe$request_uri;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme; # to forward the  original protocol (HTTP or HTTPS)
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header Host $http_host;
    }

    location /login {
       access_by_lua_block {
               local res, err = require("resty.openidc").authenticate({
                   redirect_uri = "/redirect_uri",
                   accept_none_alg = true,
                   discovery = "http://keycloak:8080/realms/portal/.well-known/openid-configuration",
                   client_id = "user-portal",
                   client_secret = "RTixiv1f1ngqp9jYYlrjbhbWzIdG18YF",
                   redirect_uri_scheme = https,
                   logout_path = "/logout",
                   revoke_tokens_on_logout = true,
                   session_contents = {access_token=true, id_token=true, enc_id_token=true},
                   access_token_expires_in = 3600,
                   scope = "openid user-portal-scope",
                   redirect_after_logout_with_id_token_hint = false,
                   post_logout_redirect_uri = "http://localhost:8090",
                   ssl_verify = "no"
               })
               if err then
                   ngx.status = 401
                   ngx.say(err)
                   ngx.exit(ngx.HTTP_UNAUTHORIZED)
               end
               ngx.req.set_header('Authorization', table.concat({"Bearer", res.access_token}, " "))
         }
         set $user_portal_fe user-portal-fe:8181;
         proxy_pass http://$user_portal_fe$request_uri;
         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
         proxy_set_header X-Forwarded-Proto $scheme; # to forward the  original protocol (HTTP or HTTPS)
         proxy_set_header X-Forwarded-Port $server_port;
         proxy_set_header Host $http_host;
   }

    location /logout {
      access_by_lua_block {
        local res, err, target, session = require("resty.openidc").authenticate({
          redirect_uri = "/redirect_uri",
          accept_none_alg = true,
          discovery = "http://keycloak:8080/realms/portal/.well-known/openid-configuration",
          client_id = "user-portal",
          client_secret = "RTixiv1f1ngqp9jYYlrjbhbWzIdG18YF",
          redirect_uri_scheme = https,
          logout_path = "/logout",
          revoke_tokens_on_logout = true,
          session_contents = {access_token=true, id_token=true, enc_id_token=true},
          access_token_expires_in = 3600,
          scope = "openid user-portal-scope",
          redirect_after_logout_with_id_token_hint = false,
          post_logout_redirect_uri = "http://localhost:8090",
          ssl_verify = "no"
        }, nil, "pass")
        session:close()
      }
    }

    location /api {
        # very basic check for a Bearer token in the Authorization header
        # API needs to do a proper check of the token
        access_by_lua_block {
            local auth_header = ngx.var.http_Authorization or ""
            if not auth_header:match("^Bearer%s+(.+)") then
                ngx.status = 401
                ngx.say("Unauthorized: No valid bearer token provided")
                ngx.exit(ngx.HTTP_UNAUTHORIZED)
            end
        }
        set $user_portal_be user-portal-be:8080;
        proxy_pass http://$user_portal_be$request_uri;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme; # to forward the original protocol (HTTP or HTTPS)
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Host $http_host;
    }

    location /admin-portal-fe/ {
       set $admin_portal_fe admin-portal-fe:3000;
       rewrite ^/admin-portal-fe/(.*)$ /$1 break;
       proxy_pass http://$admin_portal_fe;
    }
    location /admin-portal-be/ {
       set $admin_portal_be admin-portal-be:8080;
       rewrite ^/admin-portal-be/(.*)$ /$1 break;
       proxy_pass http://$admin_portal_be;
    }

    location /service-portal-fe {
      set $service_portal_fe service-portal-fe:3001;
      # Preserve the /service-portal-fe prefix so Next.js basePath routing works correctly.
      rewrite ^(/service-portal-fe.*)$ $1 break;
      proxy_pass http://$service_portal_fe;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme; # to forward the  original protocol (HTTP or HTTPS)
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header Host $http_host;
    }

    # used by the frontend for hot reloading after changes
    # HINT: only locally, don't use that on production
    location /service-portal-fe/_next/webpack-hmr {
        set $service_portal_fe service-portal-fe:3001;
        rewrite ^(/service-portal-fe/_next/webpack-hmr.*)$ $1 break;
        proxy_pass http://$service_portal_fe;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme; # to forward the  original protocol (HTTP or HTTPS)
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Host $http_host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
      }

    location /service-portal-be/ {
       set $service_portal_be service-portal-be:8080;
       rewrite ^/service-portal-be/(.*)$ /$1 break;
       proxy_pass http://$service_portal_be;
    }

    # Static upstream — keycloak is always co-located; variable form would strip path.
    location /keycloak/ {
       proxy_pass http://keycloak:8080/;
    }

}
