databaseChangeLog:
  - changeSet:
      id: "001-create-relationship-schema"
      author: "Jimdjio Dessalli"
      logicalFilePath: "001-create-relationship-schema.yml"
      objectQuotingStrategy: "QUOTE_ONLY_RESERVED_WORDS"
      preConditions:
        - onFail: MARK_RAN
        - onFailMessage: "Database tables [portal_relationship] already initialized"
        - not:
            - tableExists:
                tableName: "portal_relationship"
      changes:
        - createTable:
            tableName: "portal_relationship"
            columns:
              - column:
                  name: "id"
                  type: "BIGINT"
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: "version"
                  type: "NUMBER(38, 0)"
                  defaultValueNumeric: "1"
                  constraints:
                    nullable: false
              - column:
                  name: "type"
                  type: "VARCHAR(255)"
                  constraints:
                    nullable: false
              - column:
                  name: "name"
                  type: "VARCHAR(255)"
                  constraints:
                    nullable: false
              - column:
                  name: "profile_id"
                  type: "BIGINT"
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            constraintName: "fk_relationship_profile"
            baseTableName: "portal_relationship"
            baseColumnNames: "profile_id"
            referencedTableName: "portal_profile"
            referencedColumnNames: "id"
            onDelete: CASCADE
        - loadData:
            file: classpath:db/data/relationship-data-init.csv
            tableName: "portal_relationship"
            separator: ";"
