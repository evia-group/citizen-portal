databaseChangeLog:
  - changeSet:
      id: "000-create-profile-schema"
      author: "Jimdjo Dessalli"
      logicalFilePath: "000-create-profile-schema.yml"
      objectQuotingStrategy: "QUOTE_ONLY_RESERVED_WORDS"
      preConditions:
        - onFail: MARK_RAN
        - onFailMessage: "Database tables [portal_profile] already initialized"
        - not:
            - tableExists:
                tableName: "portal_profile"
      changes:
        - createTable:
            tableName: "portal_profile"
            columns:
              - column:
                  name: "id"
                  type: "BIGINT"
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: "version"
                  type: "NUMBER(38, 0)"
                  defaultValueNumeric: "1"
                  constraints:
                    nullable: false
              - column:
                  name: "gender"
                  type: "VARCHAR(255)"
              - column:
                  name: "grade"
                  type: "VARCHAR(255)"
              - column:
                  name: "first_name"
                  type: "VARCHAR(255)"
                  constraints:
                    nullable: false
              - column:
                  name: "last_name"
                  type: "VARCHAR(255)"
                  constraints:
                    nullable: false
              - column:
                  name: "birth_name"
                  type: "VARCHAR(255)"
              - column:
                  name: "birth_date"
                  type: "DATE"
                  constraints:
                    nullable: false
              - column:
                  name: "birth_location"
                  type: "VARCHAR(255)"
                  constraints:
                    nullable: false
              - column:
                  name: "can_notify_by_mail"
                  type: "BOOLEAN"
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: "can_notify_by_sms"
                  type: "BOOLEAN"
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: "zip_code"
                  type: "BIGINT"
                  constraints:
                    nullable: false
              - column:
                  name: "city"
                  type: "VARCHAR(255)"
                  constraints:
                    nullable: false
              - column:
                  name: "country"
                  type: "VARCHAR(255)"
              - column:
                  name: "street"
                  type: "VARCHAR(255)"
                  constraints:
                    nullable: false
              - column:
                  name: "house_number"
                  type: "BIGINT"
                  constraints:
                    nullable: false
              - column:
                  name: "phone_number"
                  type: "VARCHAR(255)"
              - column:
                  name: "email"
                  type: "VARCHAR(255)"
                  constraints:
                    nullable: false
              - column:
                  name: "de_mail"
                  type: "VARCHAR(255)"
        - loadData:
            tableName: "portal_profile"
            file: classpath:db/data/profile-data-init.csv
            separator: ;
