databaseChangeLog:
  - changeSet:
      id: "011-create-comment-schema"
      author: "Jimdjio Dessalli"
      logicalFilePath: "011-create-comment-schema.yml"
      objectQuotingStrategy: "QUOTE_ONLY_RESERVED_WORDS"
      changes:
        - createTable:
            tableName: "portal_comment"
            columns:
              - column:
                  name: "id"
                  type: "BIGINT"
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: "version"
                  type: "NUMBER(38, 0)"
                  defaultValueNumeric: "1"
                  constraints:
                    nullable: false
              - column:
                  name: "content"
                  type: "VARCHAR(255)"
                  constraints:
                    nullable: false
              - column:
                  name: "parent_comment_id"
                  type: "BIGINT"
              - column:
                  name: "created_date"
                  type: "DATE"
                  defaultValueComputed: "CURRENT_DATE"
              - column:
                  name: "updated_date"
                  type: "DATE"
                  defaultValueComputed: "CURRENT_DATE"
              - column:
                  name: "profile_id"
                  type: "BIGINT"
                  constraints:
                    nullable: false
              - column:
                  name: "application_id"
                  type: "BIGINT"
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            constraintName: "fk_user_comment"
            baseTableName: "portal_comment"
            baseColumnNames: "profile_id"
            referencedTableName: "portal_profile"
            referencedColumnNames: "id"
            onDelete: CASCADE
        - addForeignKeyConstraint:
            constraintName: "fk_application_comment"
            baseTableName: "portal_comment"
            baseColumnNames: "application_id"
            referencedTableName: "portal_application"
            referencedColumnNames: "id"
            onDelete: CASCADE
        - loadData:
            tableName: "portal_comment"
            file: classpath:db/data/comment-data-init.csv
            separator: ;
