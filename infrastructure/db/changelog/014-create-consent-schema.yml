databaseChangeLog:
  - changeSet:
      id: "014-create-consent-schema"
      author: "Mark Iarovih"
      logicalFilePath: "014-create-consent-schema.yml"
      objectQuotingStrategy: "QUOTE_ONLY_RESERVED_WORDS"
      changes:
        - createTable:
            tableName: "portal_consent"
            columns:
              - column:
                  name: "id"
                  type: "BIGINT"
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: "version"
                  type: "NUMBER(38, 0)"
                  defaultValueNumeric: "1"
                  constraints:
                    nullable: false
              - column:
                  name: "name"
                  type: "VARCHAR(255)"
                  constraints:
                    nullable: false
              - column:
                  name: "text"
                  type: "VARCHAR(255)"
                  constraints:
                    nullable: false
              - column:
                  name: "service_id"
                  type: "BIGINT"
                  constraints:
                    nullable: false
        - loadData:
            tableName: "portal_consent"
            file: classpath:db/data/consent-data-init.csv
            separator: ;
        - createTable:
            tableName: "portal_consent_log"
            columns:
              - column:
                  name: "id"
                  type: "BIGINT"
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: "version"
                  type: "NUMBER(38, 0)"
                  defaultValueNumeric: "1"
                  constraints:
                    nullable: false
              - column:
                  name: "status"
                  type: "VARCHAR(255)"
                  constraints:
                    nullable: false
              - column:
                  name: "consent_text"
                  type: "VARCHAR(255)"
                  constraints:
                    nullable: false
              - column:
                  name: "accepted_at"
                  type: "timestamptz"
                  defaultValueComputed: "NOW()"
                  constraints:
                    nullable: false
              - column:
                  name: "consent_id"
                  type: "BIGINT"
                  constraints:
                    nullable: false
              - column:
                  name: "profile_id"
                  type: "BIGINT"
                  constraints:
                    nullable: false
        - loadData:
            tableName: "portal_consent_log"
            file: classpath:db/data/consent-log-data-init.csv
            separator: ;
        - addForeignKeyConstraint:
            constraintName: "fk_consent_log_profile"
            baseTableName: "portal_consent_log"
            baseColumnNames: "profile_id"
            referencedTableName: "portal_profile"
            referencedColumnNames: "id"
            onDelete: CASCADE
        - addForeignKeyConstraint:
            constraintName: "fk_consent_log_consent"
            baseTableName: "portal_consent_log"
            baseColumnNames: "consent_id"
            referencedTableName: "portal_consent"
            referencedColumnNames: "id"
            onDelete: CASCADE
        - addForeignKeyConstraint:
            constraintName: "fk_consent_service"
            baseTableName: "portal_consent"
            baseColumnNames: "service_id"
            referencedTableName: "portal_service"
            referencedColumnNames: "id"
            onDelete: CASCADE
