schema: spec-driven

# Project context (optional)
# This is shown to AI when creating artifacts.
# Add your tech stack, conventions, style guides, domain knowledge, etc.
# Example:
#   context: |
#     Tech stack: TypeScript, React, Node.js
#     We use conventional commits
#     Domain: e-commerce platform

# Per-artifact rules (optional)
# Add custom rules for specific artifacts.
# Example:
#   rules:
#     proposal:
#       - Keep proposals under 500 words
#       - Always include a "Non-goals" section
#     tasks:
#       - Break tasks into chunks of max 2 hours

rules:
  spec:
    - State observable behaviour a consumer can rely on (WHAT/WHY), not the mechanism (HOW). If a requirement would change merely because a tool was swapped, a file moved, or an implementation detail renamed, it belongs in code, config, or tasks.md.
    - Never restate a literal (port, origin, URL) that another spec already owns. Reference it relationally by the owning capability (e.g. "the port published by gateway-routing").
    - Smell-check before writing a requirement - if you can diff it line-for-line against the implementation, it is HOW, not a spec.
